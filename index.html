<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logoprototipo.png" />
    <link rel="apple-touch-icon" href="/logoprototipo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0052CC" />

    <!-- SEO base (primer render / crawlers). Las páginas pueden sobrescribir
         estos valores en runtime con el componente <Seo> (src/components/Seo.jsx). -->
    <title>Medaner | Delivery y Viajes en Punto Fijo</title>
    <meta
      name="description"
      content="Medaner: pide comida, productos y viajes en Punto Fijo, estado Falcón. Delivery de tiendas locales y mototaxi/taxi con pago en efectivo, pago móvil o Zelle."
    />
    <link rel="canonical" href="https://medaner.com/" />

    <!-- Open Graph (previews en WhatsApp/Facebook — clave para difusión local) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Medaner" />
    <meta property="og:title" content="Medaner | Delivery y Viajes en Punto Fijo" />
    <meta
      property="og:description"
      content="Pide comida, productos y viajes en Punto Fijo. Tiendas locales y mototaxi con pago en efectivo, pago móvil o Zelle."
    />
    <meta property="og:url" content="https://medaner.com/" />
    <meta property="og:locale" content="es_VE" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Medaner | Delivery y Viajes en Punto Fijo" />
    <meta
      name="twitter:description"
      content="Delivery de tiendas locales y viajes en Punto Fijo, estado Falcón."
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0EA5A5" />
    <meta name="description" content="Medaner" />
    <title>Medaner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
